<!DOCTYPE html>
<html>
<head>
<title>Second Pair of Eyes – AI Safety Agent</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.video-container{
position:relative;
display:flex;
justify-content:center;
margin-top:20px;
}

video{
width:640px;
border-radius:12px;
border:4px solid #1e293b;
}

canvas{
position:absolute;
top:0;
}

button{
padding:12px 22px;
font-size:16px;
border:none;
border-radius:8px;
margin:10px;
cursor:pointer;
}

#start{background:#22c55e;color:white;}
#stop{background:#ef4444;color:white;}

.status{
margin-top:20px;
font-size:18px;
font-weight:bold;
padding:12px;
border-radius:8px;
background:#1e293b;
}
</style>

</head>

<body>

<div class="container">

<h1>Second Pair of Eyes – AI Safety Agent</h1>

<div class="video-container">
<video id="cam" autoplay playsinline></video>
<canvas id="overlay"></canvas>
</div>

<div style="margin-top:25px">
<button id="start">Start Agent</button>
<button id="stop">Stop</button>
</div>

<div id="status" class="status">
System Ready
</div>

</div>

<script>

let model
let detectionRunning=false

const video=document.getElementById("cam")
const canvas=document.getElementById("overlay")
const ctx=canvas.getContext("2d")
const status=document.getElementById("status")

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

video.onloadedmetadata=()=>{

canvas.width=video.videoWidth
canvas.height=video.videoHeight

}

}

async function loadModel(){

model=await cocoSsd.load()

console.log("Model loaded")

}

function drawBox(x,y,w,h,label){

ctx.strokeStyle="red"
ctx.lineWidth=3
ctx.strokeRect(x,y,w,h)

ctx.fillStyle="red"
ctx.font="16px Arial"
ctx.fillText(label,x,y-5)

}

async function detectObjects(){

if(!model || !detectionRunning) return

const predictions=await model.detect(video)

ctx.clearRect(0,0,canvas.width,canvas.height)

predictions.forEach(p=>{

drawBox(p.bbox[0],p.bbox[1],p.bbox[2],p.bbox[3],p.class)

})

}

async function detectionLoop(){

while(detectionRunning){

await detectObjects()

await new Promise(r=>setTimeout(r,200))

}

}

document.getElementById("start").onclick=async()=>{

status.innerText="Starting..."

await startCamera()

await loadModel()

detectionRunning=true

detectionLoop()

}

document.getElementById("stop").onclick=()=>{

detectionRunning=false

status.innerText="Agent stopped"

}

</script>

</body>
</html>
