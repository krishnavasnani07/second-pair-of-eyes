<!DOCTYPE html>
<html>
<head>
<title>Second Pair of Eyes – Live Agent</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

h1{
    font-size:32px;
    margin-bottom:20px;
}

.video-container{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

video{
    width:640px;
    height:480px;
    border-radius:12px;
    border:4px solid #1e293b;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.controls{
    margin-top:20px;
}

button{
    padding:12px 22px;
    font-size:16px;
    border:none;
    border-radius:8px;
    margin:10px;
    cursor:pointer;
}

#start{
    background:#22c55e;
    color:white;
}

#stop{
    background:#ef4444;
    color:white;
}

.status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    padding:12px;
    border-radius:8px;
    background:#1e293b;
}

.interrupt{
    background:#dc2626;
}

</style>

</head>

<body>

<div class="container">

<h1>Second Pair of Eyes – Live Agent</h1>

<div class="video-container">
<video id="cam" autoplay playsinline></video>
</div>

<div class="controls">
<button id="start">Start Talking</button>
<button id="stop">Stop</button>
</div>

<div id="status" class="status">
Agent: Observing...
</div>

</div>

<script>

let ws;
let recorder;
let camStream;

const video = document.getElementById("cam");
const status = document.getElementById("status");


async function startCamera(){

    camStream = await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:true
    });

    video.srcObject = camStream;

}


document.getElementById("start").onclick = async ()=>{

    status.innerText = "Connecting to AI agent...";

    ws = new WebSocket("ws://127.0.0.1:8000/voice");

    ws.binaryType = "arraybuffer";

    ws.onmessage = (event)=>{

        if(event.data==="INTERRUPT"){
            status.innerText="⚠️ AI Interrupting...";
            status.classList.add("interrupt");
            return;
        }

        status.innerText="Agent: "+event.data;
        status.classList.remove("interrupt");

    };


    ws.onopen = async ()=>{

        await startCamera();

        const stream = await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        recorder = new MediaRecorder(stream);

        recorder.ondataavailable=(e)=>{

            if(ws.readyState===WebSocket.OPEN){
                ws.send(e.data);
            }

        };

        recorder.start(300);

    };

};


document.getElementById("stop").onclick=()=>{

    if(recorder) recorder.stop();
    if(ws) ws.close();

    status.innerText="Agent stopped.";

};


</script>

</body>
</html>
